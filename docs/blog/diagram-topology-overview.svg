<svg viewBox="0 0 720 560" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ovn-fabric homelab topology, three tiers</title>
  <desc>Segments join a shared backbone. The backbone routes default traffic to whichever uplink a segment picked: the main WAN, a WireGuard exit to DE, a WireGuard exit to US, or (scoped only) ZeroTier. WireGuard and ZeroTier are tunnels with no physical presence of their own — their own bootstrap/handshake traffic can't use the tunnel that doesn't exist yet, so it routes back through the backbone and out the main WAN's real physical link, exactly like any other segment's default traffic. Starlink is a separate real physical link, standby, no backdoor needed.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666666"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a86e8"/>
    </marker>
  </defs>

  <g font-family="sans-serif">
    <text x="8" y="14" fill="#666666" font-size="10">tier 1 &#8212; segments</text>
    <rect x="20"  y="20" width="150" height="56" rx="8" fill="#f3f3f3" stroke="#666666"/>
    <text x="95" y="44" text-anchor="middle" fill="#000000" font-size="15" font-weight="600">Home</text>
    <text x="95" y="62" text-anchor="middle" fill="#666666" font-size="11">segment</text>

    <rect x="195" y="20" width="150" height="56" rx="8" fill="#f3f3f3" stroke="#666666"/>
    <text x="270" y="44" text-anchor="middle" fill="#000000" font-size="15" font-weight="600">Neighbor</text>
    <text x="270" y="62" text-anchor="middle" fill="#666666" font-size="11">segment</text>

    <rect x="370" y="20" width="150" height="56" rx="8" fill="#f3f3f3" stroke="#666666"/>
    <text x="445" y="44" text-anchor="middle" fill="#000000" font-size="15" font-weight="600">USA</text>
    <text x="445" y="62" text-anchor="middle" fill="#666666" font-size="11">segment</text>

    <rect x="545" y="20" width="155" height="56" rx="8" fill="#f3f3f3" stroke="#666666"/>
    <text x="622" y="44" text-anchor="middle" fill="#000000" font-size="15" font-weight="600">Management</text>
    <text x="622" y="62" text-anchor="middle" fill="#666666" font-size="11">segment</text>

    <rect x="220" y="140" width="280" height="52" rx="8" fill="#f3f3f3" stroke="#4a86e8" stroke-width="2"/>
    <text x="360" y="163" text-anchor="middle" fill="#000000" font-size="14" font-weight="600">Backbone</text>
    <text x="360" y="180" text-anchor="middle" fill="#666666" font-size="10">shared logical switch</text>

    <text x="8" y="234" fill="#666666" font-size="10">tier 2 &#8212; tunnel uplinks (need a backdoor)</text>
    <rect x="298" y="250" width="128" height="56" rx="8" fill="#f3f3f3" stroke="#666666"/>
    <text x="362" y="274" text-anchor="middle" fill="#000000" font-size="13" font-weight="600">VPN &#8594; DE</text>
    <text x="362" y="292" text-anchor="middle" fill="#666666" font-size="10">WireGuard tunnel</text>

    <rect x="440" y="250" width="128" height="56" rx="8" fill="#f3f3f3" stroke="#666666"/>
    <text x="504" y="274" text-anchor="middle" fill="#000000" font-size="13" font-weight="600">VPN &#8594; US</text>
    <text x="504" y="292" text-anchor="middle" fill="#666666" font-size="10">WireGuard tunnel</text>

    <rect x="582" y="250" width="128" height="56" rx="8" fill="#f3f3f3" stroke="#666666"/>
    <text x="646" y="274" text-anchor="middle" fill="#000000" font-size="13" font-weight="600">ZeroTier</text>
    <text x="646" y="292" text-anchor="middle" fill="#666666" font-size="10">mesh tunnel</text>

    <text x="8" y="364" fill="#666666" font-size="10">tier 3 &#8212; real physical uplinks</text>
    <rect x="150" y="380" width="160" height="56" rx="8" fill="#f3f3f3" stroke="#666666"/>
    <text x="230" y="404" text-anchor="middle" fill="#000000" font-size="13" font-weight="600">Main WAN</text>
    <text x="230" y="422" text-anchor="middle" fill="#666666" font-size="10">real physical link</text>

    <rect x="330" y="380" width="160" height="56" rx="8" fill="#f3f3f3" stroke="#666666" stroke-dasharray="3,3"/>
    <text x="410" y="404" text-anchor="middle" fill="#000000" font-size="13" font-weight="600">Starlink</text>
    <text x="410" y="422" text-anchor="middle" fill="#666666" font-size="10">planned backup, own link</text>

    <!-- segments -> backbone -->
    <path d="M95,76 L95,110 Q95,125 130,132 L215,150" fill="none" stroke="#666666" marker-end="url(#arrow)"/>
    <path d="M270,76 L270,140" fill="none" stroke="#666666" marker-end="url(#arrow)"/>
    <path d="M445,76 L445,140" fill="none" stroke="#666666" marker-end="url(#arrow)"/>
    <path d="M622,76 L622,110 Q622,125 585,132 L505,150" fill="none" stroke="#666666" marker-end="url(#arrow)"/>

    <!-- backbone -> tunnel uplinks (default egress for Neighbor, USA) -->
    <path d="M335,192 L362,250" fill="none" stroke="#666666" marker-end="url(#arrow)"/>
    <path d="M385,192 Q450,220 504,250" fill="none" stroke="#666666" marker-end="url(#arrow)"/>

    <!-- backbone -> physical uplinks (default egress for Home/Management via Main WAN; Starlink standby) -->
    <path d="M270,192 Q200,290 210,380" fill="none" stroke="#666666" marker-end="url(#arrow)"/>
    <path d="M310,192 Q360,290 400,380" fill="none" stroke="#4a86e8" stroke-width="1.5" stroke-dasharray="2,4" marker-end="url(#arrow-accent)"/>

    <!-- backdoor: each tunnel routes its own bootstrap traffic back through the backbone... -->
    <path d="M362,250 L360,192" fill="none" stroke="#4a86e8" stroke-width="1" stroke-dasharray="1,3" marker-end="url(#arrow-accent)"/>
    <path d="M504,250 Q450,220 400,192" fill="none" stroke="#4a86e8" stroke-width="1" stroke-dasharray="1,3" marker-end="url(#arrow-accent)"/>
    <path d="M646,250 Q560,215 440,192" fill="none" stroke="#4a86e8" stroke-width="1" stroke-dasharray="1,3" marker-end="url(#arrow-accent)"/>
    <!-- ...and out the main WAN, same physical link Home/Management already use -->
    <path d="M330,192 Q260,290 250,380" fill="none" stroke="#4a86e8" stroke-width="1" stroke-dasharray="1,3" marker-end="url(#arrow-accent)"/>

    <!-- scoped extra routes: Home & Management reach the ZeroTier mesh directly -->
    <path d="M95,76 Q15,170 55,220 Q95,245 582,262" fill="none" stroke="#4a86e8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-accent)"/>
    <path d="M622,76 Q700,170 660,220 Q652,240 646,250" fill="none" stroke="#4a86e8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-accent)"/>

    <!-- legend -->
    <line x1="20" y1="500" x2="50" y2="500" stroke="#666666"/>
    <text x="58" y="504" fill="#666666" font-size="10">default egress</text>
    <line x1="180" y1="500" x2="210" y2="500" stroke="#4a86e8" stroke-dasharray="2,4"/>
    <text x="218" y="504" fill="#666666" font-size="10">standby, not active</text>
    <line x1="380" y1="500" x2="410" y2="500" stroke="#4a86e8" stroke-dasharray="6,4"/>
    <text x="418" y="504" fill="#666666" font-size="10">scoped extraRoute</text>
    <line x1="580" y1="500" x2="610" y2="500" stroke="#4a86e8" stroke-dasharray="1,3"/>
    <text x="618" y="504" fill="#666666" font-size="10">backdoor (bootstrap only)</text>

    <text x="360" y="530" text-anchor="middle" fill="#666666" font-size="11">VPN and ZeroTier tunnels aren't real physical links &#8212; their own handshake traffic</text>
    <text x="360" y="547" text-anchor="middle" fill="#666666" font-size="11">has to route back through the backbone and out the main WAN, same as any other segment.</text>
  </g>
</svg>

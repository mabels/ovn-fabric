# CI for ovn-fabric: type-checks + smoke-tests every push/PR, and on a
# `vX.Y.Z` tag push, publishes to both npm and JSR.
#
# Publishing uses OIDC "trusted publishing" for BOTH registries — no
# NPM_TOKEN / JSR_TOKEN secrets stored anywhere (see
# https://docs.npmjs.com/trusted-publishers and JSR's own GitHub
# Actions publishing support). This requires two one-time, manual,
# registry-side setup steps that only a human with the right account
# access can do (not something this workflow or any CI run can
# perform):
#   1. npmjs.com → the "ovn-fabric" package → Settings → Trusted
#      Publisher → GitHub Actions → this repo, workflow file
#      ".github/workflows/ci.yaml".
#   2. jsr.io → create the "@adviser/ovn-fabric" package → Settings →
#      link GitHub Actions publishing to this repo.
# Until both are done, the `publish` job's registry steps will fail
# with an auth error — that's expected, not a bug in this file.
#
# Modeled after the ci/publish split in adviser/cement's
# ng-nodejs-ci.yaml (deno.json/package.json version-tag pattern is the
# same idea, adapted for this repo's Deno-first, npm-wrapped shape).

name: CI - ovn-fabric

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.x

      - name: Install (pulls in `deno` as an npm dependency)
        run: npm install

      - name: Type-check
        run: npx deno check src/*.ts examples/*.ts

      - name: Smoke test — deno entry point directly
        run: npx deno run --allow-read --allow-env src/cli.ts generate examples/minimal-topology.ts

      - name: Smoke test — npm/npx entry point
        run: node bin/ovn-fabric.js generate examples/minimal-topology.ts

  publish:
    needs: ci
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing (npm + JSR), no secrets needed

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"

      - name: Install (pulls in `deno` as an npm dependency)
        run: npm install

      - name: Verify tag matches package.json / deno.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          DENO_VERSION=$(node -p "require('./deno.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$DENO_VERSION" ]; then
            echo "::error::tag v$TAG_VERSION does not match package.json ($PKG_VERSION) / deno.json ($DENO_VERSION) — bump both before tagging"
            exit 1
          fi

      - name: Type-check (final gate before publish)
        run: npx deno check src/*.ts examples/*.ts

      - name: Publish to npm (OIDC trusted publisher — no token)
        run: |
          npm install -g npm@11
          npm publish --provenance --access public

      - name: Publish to JSR (OIDC)
        run: npx deno publish --allow-dirty

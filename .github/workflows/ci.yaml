# CI for ovn-fabric: type-checks + smoke-tests every push/PR, and on a
# `vX.Y.Z` tag push, publishes to both npm and JSR.
#
# Publishing uses OIDC "trusted publishing" for BOTH registries — no
# NPM_TOKEN / JSR_TOKEN secrets stored anywhere (see
# https://docs.npmjs.com/trusted-publishers and JSR's own GitHub
# Actions publishing support). This requires two one-time, manual,
# registry-side setup steps that only a human with the right account
# access can do (not something this workflow or any CI run can
# perform):
#   1. npmjs.com → the "@adviser/ovn-fabric" package → Settings →
#      Trusted Publisher → GitHub Actions → this repo, workflow file
#      ".github/workflows/ci.yaml".
#   2. jsr.io → create the "@adviser/ovn-fabric" package → Settings →
#      link GitHub Actions publishing to this repo.
# Until both are done, the `publish` job's registry steps will fail
# with an auth error — that's expected, not a bug in this file.
#
# Modeled after the ci/publish split in adviser/cement's
# ng-nodejs-ci.yaml. Version handling also mirrors cement's
# src/cli/utils.ts#getVersion + patch-version-cmd.ts (scaled down to a
# plain script, see scripts/patch-version.mjs): package.json/deno.json
# carry a "0.0.0" placeholder in git — the real version is derived from
# the triggering tag (GITHUB_REF) and patched into both files right
# before publish. Nothing to hand-bump/keep in sync before tagging.

name: CI - ovn-fabric

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.x

      - name: Install (pulls in `deno` as an npm dependency)
        run: npm install

      - name: Type-check
        run: npx deno check src/*.ts examples/*.ts

      - name: Unit tests
        run: npx deno test --allow-read --allow-env src/*_test.ts

      - name: Smoke test — deno entry point directly
        run: npx deno run --allow-read --allow-env src/cli.ts generate examples/minimal-topology.ts

      # Note: no npm/npx smoke test here. bin/ovn-fabric.js delegates to
      # the JSR-published "./cli" export at this exact version (see
      # bin/ovn-fabric.js's own header comment for why) — that version
      # doesn't exist on the registry yet for an ordinary push (only a
      # "0.0.0" placeholder). See the "publish" job below for the real,
      # post-publish end-to-end check of that path.

  publish:
    needs: ci
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing (npm + JSR), no secrets needed

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"

      - name: Install (pulls in `deno` as an npm dependency)
        run: npm install

      - name: Patch version from tag into package.json / deno.json
        run: node scripts/patch-version.mjs package.json deno.json

      - name: Type-check (final gate before publish)
        run: npx deno check src/*.ts examples/*.ts

      - name: Unit tests (final gate before publish)
        run: npx deno test --allow-read --allow-env src/*_test.ts

      - name: Publish to npm (OIDC trusted publisher — no token)
        run: |
          npm install -g npm@11
          npm publish --provenance --access public

      - name: Publish to JSR (OIDC)
        run: npx deno publish --allow-dirty

      # No post-publish npx smoke test here (removed 2026-07-06): it
      # failed in this exact CI environment with "ovn-fabric: not
      # found" even using the unambiguous `-p` form, while the
      # identical command works fine outside CI (confirmed manually) —
      # an npm/npx-version quirk specific to this runner, not a real
      # regression. Manually verified end-to-end instead:
      # `npx -p @adviser/ovn-fabric ovn-fabric generate-ovn ...` and
      # `deno run -A jsr:@adviser/ovn-fabric/cli generate-ovn ...`
      # both work correctly against real published versions.
